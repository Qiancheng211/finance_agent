<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智能记账助手 / Finance Agent</title>
    <style>
      :root {
        --bg: #f3f1ff;
        --card: #ffffff;
        --line: #e7e6ef;
        --text: #1f2330;
        --muted: #7a8094;
        --brand: #6d4dff;
        --brand-2: #4f46e5;
        --ok: #1b9b60;
        --danger: #d14343;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
        background: radial-gradient(circle at 20% 10%, #f8f7ff 0%, var(--bg) 52%, #efedf9 100%);
        color: var(--text);
      }
      .shell { max-width: 1320px; margin: 0 auto; padding: 16px; }
      .top {
        display: flex; justify-content: space-between; align-items: center;
        background: linear-gradient(100deg, #5e3dff, #7e58ff);
        border-radius: 14px; padding: 12px 16px; color: #fff; margin-bottom: 14px;
      }
      .top .title { font-weight: 700; }
      .badge {
        font-size: 12px; background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 999px;
        padding: 4px 10px;
      }
      .stack {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .layout {
        display: grid; gap: 14px; grid-template-columns: 430px 1fr;
        min-height: calc(100vh - 96px);
      }
      .card {
        background: var(--card); border: 1px solid var(--line);
        border-radius: 14px; box-shadow: 0 8px 20px rgba(36, 26, 89, 0.06);
      }
      .left-pane { display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; }
      .pane-head {
        padding: 14px 14px 10px; border-bottom: 1px solid var(--line);
        display: flex; justify-content: space-between; align-items: center;
      }
      .pane-title { font-size: 18px; margin: 0; }
      .pane-subtitle { margin: 3px 0 0; font-size: 12px; color: var(--muted); }
      .btn {
        border: 0; border-radius: 10px; padding: 8px 12px; cursor: pointer;
        background: var(--brand); color: #fff; font-weight: 600; font-size: 13px;
      }
      .btn:hover { background: var(--brand-2); }
      .btn-lite {
        border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px; cursor: pointer;
        background: #fff; color: #465063; font-size: 13px;
      }
      .btn-danger { background: #fff0f0; color: var(--danger); border: 1px solid #ffd7d7; }
      .filters { padding: 12px 14px 10px; border-bottom: 1px solid var(--line); }
      .search-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
      .input, .select {
        width: 100%; border: 1px solid var(--line); border-radius: 10px;
        padding: 9px 10px; font: inherit; color: var(--text); background: #fff;
      }
      .tabs { display: flex; gap: 8px; margin-top: 10px; }
      .tab {
        border: 1px solid var(--line); background: #fff; color: #606c83; border-radius: 999px;
        padding: 4px 10px; font-size: 12px; cursor: pointer;
      }
      .tab.active { background: #efeaff; color: var(--brand); border-color: #d9ceff; font-weight: 700; }
      .txn-list { padding: 8px 10px 12px; overflow: auto; }
      .txn-item {
        display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center;
        border: 1px solid var(--line); border-radius: 12px; padding: 10px; margin-bottom: 10px;
        cursor: pointer; background: #fff;
      }
      .txn-item.active { border-color: #a695ff; box-shadow: 0 0 0 3px rgba(109, 77, 255, 0.11); }
      .txn-icon {
        width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center;
        background: #f5f2ff; font-size: 18px;
      }
      .txn-title { font-weight: 700; font-size: 15px; }
      .txn-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
      .txn-actions { text-align: right; }
      .txn-amt { font-weight: 700; font-size: 18px; }
      .txn-btns { margin-top: 6px; font-size: 12px; color: #51607d; display: flex; gap: 8px; justify-content: flex-end; }
      .txn-btn { cursor: pointer; }
      .edit-wrap { border-top: 1px solid var(--line); padding: 12px 14px; background: #fbfbff; }
      .edit-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .form-label { color: var(--muted); font-size: 12px; margin: 6px 0 4px; display: block; }
      .edit-actions { display: flex; gap: 8px; margin-top: 10px; }
      .tip { margin-top: 8px; color: var(--muted); font-size: 12px; }
      .right-pane { display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; }
      .chat-head {
        border-bottom: 1px solid var(--line); padding: 12px 14px;
        display: flex; justify-content: space-between; align-items: center;
      }
      .chat-title { margin: 0; font-size: 20px; }
      .chat-subtitle { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
      .status-dot {
        width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px;
        background: #b8bfd3;
      }
      .status-dot.live { background: #1bb56f; box-shadow: 0 0 0 4px rgba(27, 181, 111, 0.12); }
      .chat-log { padding: 12px 14px; overflow: auto; background: linear-gradient(180deg, #fff, #fcfbff); }
      .msg { max-width: 76%; margin: 8px 0; border-radius: 12px; padding: 9px 12px; line-height: 1.45; font-size: 14px; }
      .msg.user { margin-left: auto; background: #efeaff; border: 1px solid #d8ccff; }
      .msg.assistant { background: #fff; border: 1px solid var(--line); }
      .event-card {
        border: 1px solid #d8efe1; background: #f1fcf5; border-radius: 12px; padding: 10px; margin: 10px 0; font-size: 13px;
      }
      .event-title { font-weight: 700; color: #17734d; margin-bottom: 6px; }
      .event-table { width: 100%; border-collapse: collapse; }
      .event-table td { padding: 4px 2px; border-bottom: 1px dashed #d8e7de; font-size: 12px; }
      .sticker {
        max-width: 320px; border: 1px solid var(--line); border-radius: 12px; background: #fff; overflow: hidden; margin: 10px 0;
      }
      .sticker img { display: block; width: 100%; }
      .sticker p { margin: 0; padding: 8px 10px; font-size: 13px; }
      .chat-input {
        border-top: 1px solid var(--line); padding: 10px; display: grid;
        grid-template-columns: 1fr auto auto; gap: 8px; align-items: center;
      }
      .send-btn {
        border: 0; background: var(--brand); color: #fff; border-radius: 10px;
        width: 40px; height: 40px; cursor: pointer; font-size: 18px;
      }
      .send-btn:disabled { background: #b8b8cc; cursor: not-allowed; }
      .ghost {
        border: 1px solid var(--line); background: #fff; color: #53607e;
        border-radius: 10px; padding: 9px 10px; font-size: 12px; cursor: pointer;
      }
      .ghost.on { border-color: #cdc3ff; color: var(--brand); background: #f5f2ff; }
      .quick-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
      .quick-row .tab { border-radius: 10px; }
      @media (max-width: 1080px) {
        .layout { grid-template-columns: 1fr; }
        .left-pane { min-height: 420px; }
        .right-pane { min-height: 520px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="top">
        <div class="title">🤖 智能记账助手 / Finance Agent</div>
        <div class="stack">
          <div class="badge"><span id="sseDot" class="status-dot"></span><span id="sseText">SSE 未连接</span></div>
          <button id="accessCodeBtn" class="btn-lite">访问码</button>
        </div>
      </div>

      <div class="layout">
        <section class="card left-pane">
          <div class="pane-head">
            <div>
              <h2 class="pane-title">账单列表</h2>
              <p class="pane-subtitle">展示你的每一笔收支</p>
            </div>
            <button id="newBtn" class="btn">+ 新建账单</button>
          </div>

          <div class="filters">
            <div class="search-row">
              <input id="searchInput" class="input" placeholder="搜索商户 / 分类 / 金额" />
              <select id="categoryFilter" class="select">
                <option value="">全部分类</option>
                <option value="餐饮">餐饮</option>
                <option value="交通">交通</option>
                <option value="购物">购物</option>
                <option value="娱乐">娱乐</option>
                <option value="学习">学习</option>
                <option value="居住">居住</option>
                <option value="医疗">医疗</option>
                <option value="收入">收入</option>
                <option value="转账">转账</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="tabs">
              <button class="tab active" data-range="recent">最近交易</button>
              <button class="tab" data-range="all">全部</button>
              <button class="tab" data-range="week">本周</button>
            </div>
          </div>

          <div id="txnList" class="txn-list"></div>

          <div class="edit-wrap">
            <div class="edit-title">编辑账单 <span id="editingId" style="color:#8a90a3;font-weight:500"></span></div>
            <div class="grid2">
              <div>
                <label class="form-label">金额(¥)</label>
                <input id="editAmount" class="input" type="number" step="0.01" placeholder="28.00" />
              </div>
              <div>
                <label class="form-label">分类</label>
                <select id="editCategory" class="select">
                  <option value="">未分类</option>
                  <option value="餐饮">餐饮</option><option value="交通">交通</option><option value="购物">购物</option>
                  <option value="娱乐">娱乐</option><option value="学习">学习</option><option value="居住">居住</option>
                  <option value="医疗">医疗</option><option value="收入">收入</option><option value="转账">转账</option><option value="其他">其他</option>
                </select>
              </div>
            </div>
            <div class="grid2">
              <div>
                <label class="form-label">商户 / 描述</label>
                <input id="editMerchant" class="input" placeholder="打车" />
              </div>
              <div>
                <label class="form-label">时间</label>
                <input id="editTime" class="input" type="datetime-local" />
              </div>
            </div>
            <div class="edit-actions">
              <button id="deleteBtn" class="btn-lite btn-danger">删除账单</button>
              <button id="saveBtn" class="btn" style="flex:1">保存修改</button>
            </div>
            <div class="tip">支持前端直连 REST CRUD：增 / 查 / 改 / 删账单</div>
          </div>
        </section>

        <section class="card right-pane">
          <div class="chat-head">
            <div>
              <h2 class="chat-title">对话记账</h2>
              <p class="chat-subtitle">自动流式吐槽 + 记账结果 / 查询 / 改账</p>
              <div class="quick-row">
                <button class="tab" data-q="今天中午吃饭20，晚上奶茶15，打车28，帮我记账">多笔记账</button>
                <button class="tab" data-q="我最近7天餐饮支出共多少">查询场景</button>
                <button class="tab" data-q="把刚才打车那笔改成26元">修改场景</button>
              </div>
            </div>
            <button id="exampleBtn" class="btn-lite">✨ 使用示例</button>
          </div>

          <div id="chatLog" class="chat-log"></div>

          <div class="chat-input">
            <input id="chatInput" class="input" placeholder="输入消费、查询或修改指令..." />
            <button id="stickerBtn" class="ghost on">表情包 开</button>
            <button id="sendBtn" class="send-btn">➤</button>
          </div>
        </section>
      </div>
    </main>

    <script>
      const STORAGE_KEY = "finance_access_identity_v1";
      function newThreadId() {
        return (window.crypto && window.crypto.randomUUID)
          ? window.crypto.randomUUID()
          : `thread_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      }
      const state = {
        transactions: [],
        selectedId: null,
        range: "recent",
        stickerEnabled: true,
        streaming: false,
        userId: "",
        accessCode: "",
        threadId: "",
      };

      const txnList = document.querySelector("#txnList");
      const searchInput = document.querySelector("#searchInput");
      const categoryFilter = document.querySelector("#categoryFilter");
      const tabs = Array.from(document.querySelectorAll("[data-range]"));
      const editingId = document.querySelector("#editingId");
      const editAmount = document.querySelector("#editAmount");
      const editCategory = document.querySelector("#editCategory");
      const editMerchant = document.querySelector("#editMerchant");
      const editTime = document.querySelector("#editTime");
      const saveBtn = document.querySelector("#saveBtn");
      const deleteBtn = document.querySelector("#deleteBtn");
      const newBtn = document.querySelector("#newBtn");
      const chatLog = document.querySelector("#chatLog");
      const chatInput = document.querySelector("#chatInput");
      const sendBtn = document.querySelector("#sendBtn");
      const exampleBtn = document.querySelector("#exampleBtn");
      const stickerBtn = document.querySelector("#stickerBtn");
      const sseDot = document.querySelector("#sseDot");
      const sseText = document.querySelector("#sseText");
      const accessCodeBtn = document.querySelector("#accessCodeBtn");

      function fmtMoney(n) {
        return `¥ ${Number(n || 0).toFixed(2)}`;
      }
      function fmtTime(v) {
        if (!v) return "--";
        const d = new Date(v.replace(" ", "T"));
        if (Number.isNaN(d.getTime())) return v;
        return `${d.getMonth() + 1}-${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
      }
      function toLocalDatetimeValue(v) {
        if (!v) return "";
        const d = new Date(v.replace(" ", "T"));
        if (Number.isNaN(d.getTime())) return "";
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        return `${y}-${m}-${day}T${hh}:${mm}`;
      }
      function categoryEmoji(category) {
        const m = { 餐饮: "🍜", 交通: "🚕", 购物: "🛍️", 娱乐: "🎮", 学习: "📚", 居住: "🏠", 医疗: "💊", 收入: "💰", 转账: "🔁" };
        return m[category] || "🧾";
      }
      function setSSE(live, text) {
        sseDot.className = live ? "status-dot live" : "status-dot";
        sseText.textContent = text;
      }

      async function fetchJSON(url, options = {}) {
        const resp = await fetch(url, options);
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.detail || data.message || "请求失败");
        return data;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function saveIdentity() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          user_id: state.userId,
          access_code: state.accessCode,
          thread_id: state.threadId,
        }));
      }

      function loadIdentity() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.user_id || !parsed.access_code) return null;
          return parsed;
        } catch (_) {
          return null;
        }
      }

      function updateAccessCodeButton() {
        accessCodeBtn.textContent = state.accessCode ? `访问码 ${state.accessCode}` : "访问码";
      }

      async function ensureIdentity() {
        const existing = loadIdentity();
        if (existing) {
          state.userId = existing.user_id;
          state.accessCode = existing.access_code;
          state.threadId = existing.thread_id || newThreadId();
          updateAccessCodeButton();
          saveIdentity();
          return;
        }

        const input = window.prompt("请输入访问码（首次使用可留空，系统将自动生成）", "");
        if (input && input.trim()) {
          const login = await fetchJSON("/api/v1/finance/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ access_code: input.trim().toUpperCase() }),
          });
          state.userId = login.user_id;
          state.accessCode = login.access_code;
        } else {
          const created = await fetchJSON("/api/v1/finance/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
          });
          state.userId = created.user_id;
          state.accessCode = created.access_code;
          window.alert(`你的访问码是：${state.accessCode}\n请保存此访问码，下次输入可找回历史记录和偏好。`);
        }
        if (!state.threadId) state.threadId = newThreadId();
        saveIdentity();
        updateAccessCodeButton();
      }

      function currentLimit() {
        if (state.range === "recent") return 10;
        return 50;
      }

      function filterLocal(items) {
        if (state.range !== "week") return items;
        const now = Date.now();
        const weekAgo = now - 7 * 24 * 60 * 60 * 1000;
        return items.filter((i) => {
          const t = new Date(String(i.transaction_time || "").replace(" ", "T")).getTime();
          return !Number.isNaN(t) && t >= weekAgo && t <= now;
        });
      }

      async function loadTransactions() {
        const keyword = searchInput.value.trim();
        const category = categoryFilter.value;
        const params = new URLSearchParams({
          limit: String(currentLimit()),
          keyword,
          category,
        });
        const data = await fetchJSON(`/api/v1/finance/transactions?${params.toString()}`);
        state.transactions = filterLocal(data.items || []);
        renderTransactions();
      }

      function renderTransactions() {
        if (!state.transactions.length) {
          txnList.innerHTML = `<div class="txn-meta" style="padding:12px">暂无记录，先在右侧发起“对话记账”吧。</div>`;
          return;
        }

        txnList.innerHTML = state.transactions
          .map((item) => {
            const active = item.id === state.selectedId ? " active" : "";
            return `
              <div class="txn-item${active}" data-id="${item.id}">
                <div class="txn-icon">${categoryEmoji(item.category)}</div>
                <div>
                  <div class="txn-title">${escapeHtml(item.merchant || "未命名账单")}</div>
                  <div class="txn-meta">${escapeHtml(item.category || "未分类")} · ${escapeHtml(fmtTime(item.transaction_time))}</div>
                </div>
                <div class="txn-actions">
                  <div class="txn-amt">${fmtMoney(item.amount)}</div>
                  <div class="txn-btns">
                    <span class="txn-btn" data-act="edit" data-id="${item.id}">编辑</span>
                    <span class="txn-btn" data-act="delete" data-id="${item.id}" style="color:#d14343">删除</span>
                  </div>
                </div>
              </div>`;
          })
          .join("");

        txnList.querySelectorAll(".txn-item").forEach((el) => {
          el.addEventListener("click", () => selectTransaction(Number(el.dataset.id)));
        });
        txnList.querySelectorAll(".txn-btn").forEach((el) => {
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = Number(el.dataset.id);
            if (el.dataset.act === "edit") selectTransaction(id);
            if (el.dataset.act === "delete") removeTransaction(id);
          });
        });
      }

      function selectTransaction(id) {
        const item = state.transactions.find((x) => x.id === id);
        if (!item) return;
        state.selectedId = id;
        editingId.textContent = `ID: ${id}`;
        editAmount.value = item.amount ?? "";
        editCategory.value = item.category || "";
        editMerchant.value = item.merchant || item.description || "";
        editTime.value = toLocalDatetimeValue(item.transaction_time);
        renderTransactions();
      }

      function resetEditor() {
        state.selectedId = null;
        editingId.textContent = "";
        editAmount.value = "";
        editCategory.value = "";
        editMerchant.value = "";
        editTime.value = "";
      }

      async function saveTransaction() {
        if (!state.selectedId) {
          alert("请先在左侧选择一条账单再修改。");
          return;
        }
        const payload = {
          amount: editAmount.value ? Number(editAmount.value) : null,
          category: editCategory.value || null,
          merchant: editMerchant.value || null,
          description: editMerchant.value || null,
          transaction_time: editTime.value ? editTime.value.replace("T", " ") : null,
        };
        await fetchJSON(`/api/v1/finance/transactions/${state.selectedId}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        await loadTransactions();
        selectTransaction(state.selectedId);
      }

      async function removeTransaction(id = state.selectedId) {
        if (!id) return;
        if (!window.confirm("确定删除这条账单吗？")) return;
        await fetchJSON(`/api/v1/finance/transactions/${id}`, { method: "DELETE" });
        if (state.selectedId === id) resetEditor();
        await loadTransactions();
      }

      function addMessage(role, text) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.textContent = text;
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
        return div;
      }

      function addBillEvent(payload) {
        const wrap = document.createElement("div");
        wrap.className = "event-card";
        const saved = Array.isArray(payload.saved) ? payload.saved : [];
        const rows = saved
          .map((it) => `<tr><td>${escapeHtml(it.category || "未分类")}</td><td>${escapeHtml(it.merchant || "--")}</td><td>${escapeHtml(fmtMoney(it.amount))}</td><td>成功</td></tr>`)
          .join("");
        wrap.innerHTML = `
          <div class="event-title">✅ 记账结果 bill_saved</div>
          <div>成功 ${escapeHtml(payload.saved_count || 0)} 笔，失败 ${escapeHtml(payload.skipped_count || 0)} 笔</div>
          ${rows ? `<table class="event-table">${rows}</table>` : ""}`;
        chatLog.appendChild(wrap);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function addSticker(payload) {
        const card = document.createElement("div");
        card.className = "sticker";
        card.innerHTML = `
          ${payload.sticker_url ? `<img src="${escapeHtml(payload.sticker_url)}" alt="sticker" />` : ""}
          <p>${escapeHtml(payload.caption || "今天也是努力记账的一天 😎")}</p>`;
        chatLog.appendChild(card);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      async function sendMessage() {
        const message = chatInput.value.trim();
        if (!message || state.streaming) return;

        state.streaming = true;
        sendBtn.disabled = true;
        setSSE(true, "SSE 流式已连接");
        addMessage("user", message);
        chatInput.value = "";

        let assistantNode = addMessage("assistant", "");

        try {
          const response = await fetch("/api/v1/finance/chat/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message,
              user_id: state.userId,
              thread_id: state.threadId,
              sticker_enabled: state.stickerEnabled,
            }),
          });
          if (!response.ok) {
            throw new Error(await response.text());
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let buffer = "";
          let eventName = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const blocks = buffer.split("\n\n");
            buffer = blocks.pop() || "";

            for (const block of blocks) {
              if (!block.trim()) continue;
              const lines = block.split("\n");
              let dataLine = "";
              for (const line of lines) {
                if (line.startsWith("event:")) eventName = line.slice(6).trim();
                if (line.startsWith("data:")) dataLine += line.slice(5).trim();
              }
              if (!dataLine) continue;
              const payload = JSON.parse(dataLine);
              if (eventName === "text") {
                assistantNode.textContent += payload.delta || "";
              } else if (eventName === "bill_saved") {
                addBillEvent(payload);
                loadTransactions();
              } else if (eventName === "sticker") {
                addSticker(payload);
              } else if (eventName === "done") {
                setSSE(false, "SSE 处理完成");
              }
              chatLog.scrollTop = chatLog.scrollHeight;
            }
          }
        } catch (err) {
          addMessage("assistant", `请求失败：${String(err.message || err)}`);
          setSSE(false, "SSE 连接失败");
        } finally {
          state.streaming = false;
          sendBtn.disabled = false;
        }
      }

      function applyStickerBtn() {
        stickerBtn.className = state.stickerEnabled ? "ghost on" : "ghost";
        stickerBtn.textContent = state.stickerEnabled ? "表情包 开" : "表情包 关";
      }

      async function init() {
        await ensureIdentity();
        applyStickerBtn();
        await loadTransactions();
      }

      sendBtn.addEventListener("click", sendMessage);
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      exampleBtn.addEventListener("click", () => {
        chatInput.value = "今天中午吃饭20，晚上奶茶15，打车28，帮我记账";
        chatInput.focus();
      });
      document.querySelectorAll("[data-q]").forEach((btn) => {
        btn.addEventListener("click", () => {
          chatInput.value = btn.dataset.q || "";
          chatInput.focus();
        });
      });
      tabs.forEach((tab) => tab.addEventListener("click", async () => {
        tabs.forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        state.range = tab.dataset.range || "recent";
        await loadTransactions();
      }));
      searchInput.addEventListener("input", loadTransactions);
      categoryFilter.addEventListener("change", loadTransactions);
      saveBtn.addEventListener("click", saveTransaction);
      deleteBtn.addEventListener("click", () => removeTransaction());
      newBtn.addEventListener("click", () => {
        resetEditor();
        chatInput.value = "今天午饭20，奶茶16，打车38，帮我记账";
        chatInput.focus();
      });
      stickerBtn.addEventListener("click", () => {
        state.stickerEnabled = !state.stickerEnabled;
        applyStickerBtn();
      });
      accessCodeBtn.addEventListener("click", () => {
        if (!state.accessCode) {
          alert("当前还没有访问码。");
          return;
        }
        alert(`当前访问码：${state.accessCode}\n请妥善保存，用于下次登录。`);
      });

      init();
    </script>
  </body>
</html>
